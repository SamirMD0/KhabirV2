services:
  web:
    build: .
    command: gunicorn --bind 0.0.0.0:5000 --workers 2 --reload backend.app:app
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://khabir:khabir@db:5432/khabir
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: khabir
      POSTGRES_PASSWORD: khabir
      POSTGRES_DB: khabir
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
